apiVersion: v1
kind: ServiceAccount
metadata:
  name: sales-app-sa
  namespace: sales-app
  annotations:
    # 【レクチャー 35: EKS固有のIRSA】
    # ※ Terraform適用後、出力された ARN に差し替えてください。
    eks.amazonaws.com/role-arn: "arn:aws:iam::111122223333:role/sales-management-dev-sales-app-irsa-role"
# 【レクチャー 34: 権限の最小化】
# ■ このYAMLは何を定義しているか
# PodがAWSやK8s内部のAPIと通信する際の「身分証明書」となる「ServiceAccount(SA)」を定義しています。
# 
# ■ デフォルト設定（危ない状態）はどうなっているか
# デフォルトでは `automountServiceAccountToken: true` となっており、
# 自動的にK8s API操作用の強力な認証トークンがPod内にマウントされ、乗っ取られた際にAPI層へ攻撃されるリスクがあります。
# 
# ■ セキュリティ設定（守るための行）はどこか
# `automountServiceAccountToken: false` と明示的に無効化し、不要なトークンマウントを防いでいます。
# その上で、上記 `annotations:` にて必要なAWS権限（IAMロール）だけをピンポイントで与えています。
automountServiceAccountToken: false
