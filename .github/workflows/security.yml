name: Security Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    # branches の指定を外すことで、すべてのプルリクエストに対してトリガーされます

jobs:
  # -----------------------------------------------------
  # 1. すべてのPRとマージ時に実行される脆弱性スキャン (Snyk)
  # -----------------------------------------------------
  vulnerability-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk test 
        continue-on-error: true
        run: snyk test --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # -----------------------------------------------------
  # 2. main / develop へのマージ時のみ実行される SBOM 生成と Trivy スキャン
  # -----------------------------------------------------
  sbom-generation:
    name: Generate and Scan SBOM
    runs-on: ubuntu-latest
    # push イベントかつ main または develop ブランチの場合のみ実行する条件
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: syft . -o cyclonedx-json=sbom.json

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy vulnerability scanner on SBOM
        continue-on-error: true
        run: trivy sbom sbom.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: sbom.json
